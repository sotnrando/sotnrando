<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SotN | Wheel of Fun</title>
    <link rel="icon" href="images/ICON.jpg">
    <script src="src/wheel.js"></script>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/wheel.css">
</head>

<body>
    <header>
        <h1>Castlevania: Symphony of the Night</h1>
        <h3>Wheel of Fun</h3>
    </header>
    <main>
    <div id="navbar-container"></div>
    <script src="/src/navbar.js"></script>
        <div id="overlay" >
            <div id="prompt-box">
                <p>Enter List Name:</p>
                <input type="text" id="customWheelName" />
                <br />
                <button onclick="submitWheelSave()">Save</button>
                <button onclick="cancelWheelSave()">Cancel</button>
            </div>
        </div>
        <iframe id="presetWheel" src="" scrolling="no" frameborder="0"></iframe>
        <div class="categoryFilter">
            <strong>Select Categories:</strong>
            <div id="categoryButtons">
                <button class="filter-btn" data-category="allPresets">All Presets</button>
                <button class="filter-btn" data-category="tournament">Tournament</button>
                <button class="filter-btn" data-category="evergreen">Evergreen</button>
                <button class="filter-btn" data-category="bountyHunter">Bounty Hunter Presets</button>
            </div>
        </div>
        <div class="customListInput">
            <label for="customPresets">Add Custom Preset List:</label>
            <textarea id="customPresets" placeholder="e.g. Nimble, Lycanthrope, Warlock,..."></textarea>
            <div class="wheelButtons">
                <button onclick="applyCustomPresets()">Apply Custom List</button>
            </div>
        </div>
        <div id="checkboxesContainer" class="wheelPicks"></div>
        <div class="wheelButtons">
            <button id="btnGenerate">Generate Wheel</button>
            <button onclick="clearAllCheckboxes()">Clear All</button>
            <button onclick="selectAllCheckboxes()">Select All</button>
            <button onclick="startWheelSave()">Save as new Wheel</button>
            <button onclick="deleteCustomWheels()">Delete Custom Wheels</button>
        </div>
    </main>
</body>

</html>
