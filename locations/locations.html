<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SotN | Relic Locations</title>
    <link rel="icon" href="images/ICON.jpg">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="locations.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <h1>Castlevania: Symphony of the Night</h1>
        <h3>Relic Locations</h3>
    </header>
    <div id="navbar-container"></div>
    <script src="/src/navbar.js"></script>
    <main>
        <div class="logic-container">
            <h2>Select an Area</h2>

            <select id="areaSelector" class="logic-dropdown">
                <option value="">-- Choose an Area --</option>
            </select>

            <div id="checksContainer" class="logic-results">
                <p>Select an area to view its checks.</p>
            </div>
        </div>
    </main>

</body>
<script>
fetch("data.json")
    .then(response => response.json())
    .then(data => {
        window.areas = data; // store globally
        initializeAreaSelector();
    });
</script>
</html>
