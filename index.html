<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SotN Randomizer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/home.css">
</head>

<body>

    <div class="viewportWindow">
        <div class="heroContainer">
            <img id="bg" class="hero-bg">
            <img id="centerChar" class="layer centerLayer">
            <img id="logo" class="layer logoLayer">
            <img id="leftChar" class="layer layer1" data-base="scaleX(-1)">
            <img id="rightChar" class="layer layer2">
        </div>

        <button class="goButton" onclick="window.location.href='randomizer.html'">
            Go To Randomizer
        </button>
    </div>

    <script>
        const backgrounds = [
            "https://ik.imagekit.io/xr0nkioc2q/background.png"
        ];

        const logos = [
            "https://ik.imagekit.io/xr0nkioc2q/logo.png"
        ];

        const centerGroup = [
            "https://ik.imagekit.io/xr0nkioc2q/DraculaYellow.png",
            "https://ik.imagekit.io/xr0nkioc2q/DraculaPurple.png",
            "https://ik.imagekit.io/xr0nkioc2q/DraculaPink.png",
            "https://ik.imagekit.io/xr0nkioc2q/DraculaGreen.png",
            "https://ik.imagekit.io/xr0nkioc2q/DraculaBlue.png",
            "https://ik.imagekit.io/xr0nkioc2q/DraculaDefault.png"
        ];

        const groupA = [
            "https://ik.imagekit.io/xr0nkioc2q/Purple%20Richter.png",
            "https://ik.imagekit.io/xr0nkioc2q/Yellow%20Richter.png",
            "https://ik.imagekit.io/xr0nkioc2q/Pink%20Richter.png",
            "https://ik.imagekit.io/xr0nkioc2q/Green%20Richter.png",
            "https://ik.imagekit.io/xr0nkioc2q/Orange%20Richter.png",
            "https://ik.imagekit.io/xr0nkioc2q/RICHTER.png",
            "https://ik.imagekit.io/xr0nkioc2q/Cyan%20Richter.png",
            "https://ik.imagekit.io/xr0nkioc2q/Grey%20Richter.png"
        ];

        const groupB = [
            "https://ik.imagekit.io/xr0nkioc2q/RedAlucard.png",
            "https://ik.imagekit.io/xr0nkioc2q/BlueAlucard.png",
            "https://ik.imagekit.io/xr0nkioc2q/PurpleAlucard.png",
            "https://ik.imagekit.io/xr0nkioc2q/ALUCARD.png"
        ];

        function pickRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function randomizeImages() {
            const bg = document.getElementById("bg");
            const leftEl = document.getElementById("leftChar");
            const rightEl = document.getElementById("rightChar");
            const centerEl = document.getElementById("centerChar");
            const logoEl = document.getElementById("logo");
            const buttonEl = document.querySelector(".goButton");

            bg.src = pickRandom(backgrounds);

            // Logo selection
            const now = new Date();
            const isJune = now.getMonth() === 5;
            logoEl.src = isJune ? "https://ik.imagekit.io/xr0nkioc2q/logopride.png" : pickRandom(logos);

            const leftGroup = Math.random() < 0.5 ? groupA : groupB;
            const rightGroup = leftGroup === groupA ? groupB : groupA;

            leftEl.src = pickRandom(leftGroup);
            rightEl.src = pickRandom(rightGroup);
            centerEl.src = pickRandom(centerGroup);

            //Step 1: Left + Right animate
            leftEl.classList.add("charEnter");
            rightEl.classList.add("charEnterRight");

            let finishedLR = 0;

            function lrDone() {
                finishedLR++;
                if (finishedLR === 2) {
                    //Step 2: Center fades in
                    centerEl.classList.add("centerEnter");

                    centerEl.addEventListener("animationend", () => {
                        //Step 3: Logo fades in
                        logoEl.classList.add("logoFadeIn");

                        logoEl.addEventListener("animationend", () => {
                            //Step 4: Button fades in
                            buttonEl.classList.add("showButton");
                        }, { once: true });

                    }, { once: true });
                }
            }

            leftEl.addEventListener("animationend", lrDone, { once: true });
            rightEl.addEventListener("animationend", lrDone, { once: true });
        }

        randomizeImages();
    </script>

</body>

</html>
