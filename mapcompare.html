<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Tool</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="icon" href="images/favicon.ico">

</head>

<body>
    <header>
        <h1>Castlevania: Symphony of the Night</h1>
        <h3>Map Tools</h3>
    </header>
    <div id="navbar-container"></div>
    <script src="/src/navbar.js"></script>
    <div class="mapCompare">
        <h2>200.6% Map Tool</h2>

        <div class="controls">
            <label>
                Map Selector
                <select id="img1Selector">
                    <option value="" selected>— Choose —</option>
                    <option value="images/Castle_One.png">Castle 1</option>
                    <option value="images/Castle_Two.png">Castle 2</option>
                </select>
            </label>
            <label>
                Your Map
                <input type="file" id="img2Input" accept="image/*" />
            </label>
            <label>
                Overlay Opacity
                <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.5" />
            </label>
            <button id="cropToggle">Crop Mode</button>
        </div>
        <ul id="keyboardControls" style="color: white; list-style: none;">
            <li>Shift + ↑ — Contract image horizontally</li>
            <li>Shift + ↓ — Stretch image horizontally</li>
            <li>Shift + ← — Contract image vertically</li>
            <li>Shift + → — Stretch image vertically</li>
            <li>↑ ↓ → ← — Moves image</li>
        </ul>
        <canvas id="mainCanvas" width="800" height="600"></canvas>
    </div>

    <script src="./src/map_comparison.js"></script>
</body>

</html>
