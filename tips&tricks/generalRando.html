<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Rando</title>
    <link rel="icon" href="/images/favicon.ico">
    <link rel="stylesheet" href="../../styles/main.css">
</head>
<body>
    <header>
        <h1>Castlevania: Symphony of the Night</h1>
    </header>
    <div id="navbar-container"></div>
    <script src="/src/navbar.js"></script>
    <main>
        <section>

            <!-- Trick Selector -->
            <h3>Select a Trick</h3>
            <select id="trickSelector"></select>

            <!-- Trick Content -->
            <h3 id="trickTitle"></h3>
            <h2 id="difficulty"></h2>
            <h2 id="utility"></h2>
            <div id="trickContent"></div>

            <!-- Video Container -->
            <div id="videoContainer"></div>

        </section>
    </main>

   <script>
        fetch("generalTricks.json")
            .then(r => r.json())
            .then(data => initializeTrickPage(data));
    </script>


<script src="tricks.js"></script>
</body>
</html>
